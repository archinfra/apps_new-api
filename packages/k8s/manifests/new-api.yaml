apiVersion: v1
kind: Namespace
metadata:
  name: __NAMESPACE__
---
apiVersion: v1
kind: Secret
metadata:
  name: new-api-secret
  namespace: __NAMESPACE__
type: Opaque
stringData:
  SQL_DSN: "__SQL_DSN__"
  REDIS_CONN_STRING: "__REDIS_CONN_STRING__"
  POSTGRES_PASSWORD: "__POSTGRES_PASSWORD__"
  REDIS_PASSWORD: "__REDIS_PASSWORD__"
  SESSION_SECRET: "__SESSION_SECRET__"
---
apiVersion: v1
kind: Service
metadata:
  name: new-api-redis
  namespace: __NAMESPACE__
spec:
  selector:
    app: new-api-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api-redis
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: new-api-redis
  template:
    metadata:
      labels:
        app: new-api-redis
    spec:
      containers:
        - name: redis
          image: __REDIS_IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$REDIS_PASSWORD\""]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: new-api-secret
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
              name: redis
---
apiVersion: v1
kind: Service
metadata:
  name: new-api-postgres
  namespace: __NAMESPACE__
spec:
  selector:
    app: new-api-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: new-api-postgres
  namespace: __NAMESPACE__
spec:
  serviceName: new-api-postgres
  replicas: 1
  selector:
    matchLabels:
      app: new-api-postgres
  template:
    metadata:
      labels:
        app: new-api-postgres
    spec:
      containers:
        - name: postgres
          image: __POSTGRES_IMAGE__
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: root
            - name: POSTGRES_DB
              value: new-api
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: new-api-secret
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: pg-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: pg-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: __POSTGRES_STORAGE_SIZE__
---
apiVersion: v1
kind: Service
metadata:
  name: new-api
  namespace: __NAMESPACE__
spec:
  type: __SERVICE_TYPE__
  selector:
    app: new-api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
__NODE_PORT_LINE__
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-api
  namespace: __NAMESPACE__
spec:
  replicas: 1
  selector:
    matchLabels:
      app: new-api
  template:
    metadata:
      labels:
        app: new-api
    spec:
      containers:
        - name: new-api
          image: __NEW_API_IMAGE__
          imagePullPolicy: IfNotPresent
          args: ["--log-dir", "/app/logs"]
          env:
            - name: SQL_DSN
              valueFrom:
                secretKeyRef:
                  name: new-api-secret
                  key: SQL_DSN
            - name: REDIS_CONN_STRING
              valueFrom:
                secretKeyRef:
                  name: new-api-secret
                  key: REDIS_CONN_STRING
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: new-api-secret
                  key: SESSION_SECRET
            - name: TZ
              value: "__TZ__"
            - name: ERROR_LOG_ENABLED
              value: "true"
            - name: BATCH_UPDATE_ENABLED
              value: "true"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/status
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
